services:
  upgrade:
    image: docker.io/library/alpine:${ALPINE_VERSION}
    command: /bin/ash -c "echo 'upgrade' && sleep ${sleep.time}"
    ports:
    - "http.port:80"
    - name: https
      target: 443
      published: https.port
      protocol: tcp
      app_protocol: http
      mode: host
    healthcheck:
      test: ["CMD", "ip", "addr", "show"]
      interval: 1s
      timeout: 1s
      retries: 3
    volumes:
    - type: bind
      target: /tmp
      source: ${project.build.directory}/tmp1
